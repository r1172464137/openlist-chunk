name: Build and Release OpenList

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  watch:                              # 🔑 新增
    types: [started]                  # 🔑 点 Star 触发

jobs:
  build-backend-binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Mingw-w64 (For Windows CGO)
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64

      - name: Build for Linux
        run: |
          export CGO_ENABLED=1
          go build -o openlist-linux-amd64 -tags=jsoniter -ldflags="-s -w" .

      - name: Build for Windows
        run: |
          export CGO_ENABLED=1
          export CC=x86_64-w64-mingw32-gcc
          export CXX=x86_64-w64-mingw32-g++
          export GOOS=windows
          export GOARCH=amd64
          go build -o openlist-windows-amd64.exe -tags=jsoniter -ldflags="-s -w" .

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: openlist-binaries
          path: |
            openlist-linux-amd64
            openlist-windows-amd64.exe

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2      # 🔑 自动发布 Release
        if: github.event_name == 'watch'           # 🔑 只在 Star 触发时发布
        with:
          tag_name: v1.0.${{ github.run_number }}
          files: |
            openlist-linux-amd64
            openlist-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-push-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openlist-chunk
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
